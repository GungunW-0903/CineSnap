name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        env:
          GITHUB_PAGES: true
          # Set these as repository Variables (Settings → Secrets and variables →
          # Actions → Variables). They are public by design (Vite inlines VITE_*
          # into the client bundle), so Variables — not Secrets — are correct.
          #   VITE_API_BASE_URL          → https://<your-backend-host>/api
          #   VITE_CLERK_PUBLISHABLE_KEY → pk_test_… (or pk_live_…)
          #   VITE_CURRENCY              → $  (optional)
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_CURRENCY: ${{ vars.VITE_CURRENCY }}
        run: npm run build

      - name: Add SPA fallback
        run: cp client/dist/index.html client/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
